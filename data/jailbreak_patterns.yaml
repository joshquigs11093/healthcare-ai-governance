# Known jailbreak / prompt-injection phrases (.spec §6.5).
#
# Curated from public research; refreshed quarterly. Matching is case-insensitive
# substring matching. This is a recall-oriented first pass; the optional LLM check
# catches novel patterns. These are phrases that, appearing in an LLM OUTPUT,
# suggest the model acknowledged or complied with an attempt to bypass safety.

patterns:
  - "ignore previous instructions"
  - "ignore all previous instructions"
  - "disregard the above"
  - "disregard your instructions"
  - "as dan"
  - "do anything now"
  - "developer mode enabled"
  - "i am now in developer mode"
  - "jailbroken"
  - "i can now bypass"
  - "without any restrictions"
  - "i will ignore my guidelines"
  - "pretend you have no rules"
  - "sure, here is how to bypass"
  - "as an unfiltered ai"
  - "i am not bound by"
